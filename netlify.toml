# Momoto Café — configuración de Netlify (sitio 100% estático, sin build)

[build]
  # No hay paso de compilación: se publica la raíz tal cual.
  publish = "."
  # Base URL después de configurar dominio personalizado
  base = "."

# Cabeceras de seguridad para todas las rutas
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# URL limpia para el aviso de privacidad (Netlify ya sirve /aviso-de-privacidad,
# este rewrite lo deja explícito y a prueba de fallos).
[[redirects]]
  from = "/aviso-de-privacidad"
  to = "/aviso-de-privacidad.html"
  status = 200

# Página 404 personalizada
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

