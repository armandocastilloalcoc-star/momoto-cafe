<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Gracias por tu pedido! | Momoto Café</title>
<meta name="description" content="Tu pago fue recibido. Tostamos tu café bajo pedido y te avisamos por WhatsApp con tu número de guía en cuanto salga.">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#062B26">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<!-- Analytics (mismo setup que el sitio: Consent Mode v2, denegado por defecto) -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('consent','default',{ad_storage:'denied',ad_user_data:'denied',ad_personalization:'denied',analytics_storage:'denied',wait_for_update:500});
</script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-B34JLPW88G"></script>
<script>
  gtag('js', new Date());
  gtag('config','G-B34JLPW88G',{anonymize_ip:true});
  gtag('config','AW-2837740315');
  try{
    var _c=JSON.parse(localStorage.getItem('momoto_cookie_consent_v1')||'null');
    window.__momotoConsent = !!(_c && _c.accepted && (!_c.expiry || new Date(_c.expiry)>new Date()));
    if(window.__momotoConsent) gtag('consent','update',{ad_storage:'granted',ad_user_data:'granted',ad_personalization:'granted',analytics_storage:'granted'});
  }catch(e){ window.__momotoConsent=false; }
</script>
<script>
  !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
  n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}
  (window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
  fbq('consent', window.__momotoConsent ? 'grant' : 'revoke');
  fbq('init','3606104369544075');
  fbq('track','PageView');
</script>
</head>
<body>
<main class="gracias-hero">
  <div class="gracias-card">
    <img src="assets/logo-header.png" alt="Momoto Café" width="178" height="60" style="display:block;margin:0 auto 26px">
    <svg class="fauna-ok" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="32" cy="32" r="26"/><path d="M21 33l8 8 14-16"/>
    </svg>
    <h1>¡Gracias por tu pedido!</h1>
    <p>Tu pago fue recibido con éxito. Tostamos tu café <strong style="color:#F4EFE6">bajo pedido</strong> y en cuanto salga tu paquete te compartimos por WhatsApp tu <strong style="color:#F4EFE6">número de guía y la paquetería</strong> para que lo rastrees en nuestra página.</p>
    <a class="btn btn--onDark" href="/#rastreo">Rastrear mi pedido</a>
    <a class="btn btn--ghost on-dark" href="https://wa.me/5219993183525?text=Hola%20Momoto%2C%20acabo%20de%20pagar%20mi%20pedido" target="_blank" rel="noopener">Avisar por WhatsApp</a>
  </div>
</main>
<!-- Confirma el pago (evita declarar "pago recibido" a visitantes directos) y vacía el carrito -->
<script>
(function(){
  try{
    var q=new URLSearchParams(location.search);
    var sid=q.get('session_id');
    var proof = !!sid || q.get('pp')==='ok' || q.get('sub')==='ok';
    var card=document.querySelector('.gracias-card');
    function neutral(){
      if(!card) return;
      var h=card.querySelector('h1'), p=card.querySelector('p');
      if(h) h.textContent='Aquí verás tu confirmación';
      if(p) p.innerHTML='Cuando completes un pago, esta página confirmará tu pedido. ¿Buscas nuestro café?';
    }
    if(!proof){ neutral(); return; }
    localStorage.removeItem('momoto_carrito_v1'); // pago confirmado: vaciar carrito
    if(q.get('sub')==='ok' && card){
      var hs=card.querySelector('h1'); if(hs) hs.textContent='¡Bienvenido a tu suscripción!';
      if(sid){
        var mng=document.createElement('a');
        mng.className='btn btn--onDark';
        mng.href='/api/customer-portal?session_id='+encodeURIComponent(sid);
        mng.textContent='Gestiona o cancela tu suscripción';
        var firstBtn=card.querySelector('.btn');
        if(firstBtn) firstBtn.parentNode.insertBefore(mng, firstBtn);
      }
    }
    if(sid){
      fetch('/api/verify-session?session_id='+encodeURIComponent(sid))
        .then(function(r){return r.json();})
        .then(function(d){
          if(d && d.paid===false){ neutral(); return; }
          if(d && d.paid && window.__momotoConsent){
            var cur=(d.currency||'mxn').toUpperCase();
            var val=(d.amount!=null)? d.amount/100 : undefined;
            try{ gtag('event','purchase',{transaction_id:sid,value:val,currency:cur}); }catch(_){}
            try{ if(typeof fbq==='function') fbq('track','Purchase',{value:val,currency:cur}); }catch(_){}
            /* Google Ads: reemplaza PURCHASE_LABEL por la etiqueta de tu conversión de COMPRA (AW-2837740315/xxxx) */
            try{ gtag('event','conversion',{send_to:'AW-2837740315/PURCHASE_LABEL',value:val,currency:cur,transaction_id:sid}); }catch(_){}
          }
        })
        .catch(function(){});
    }
  }catch(e){}
})();
</script>
</body>
</html>
