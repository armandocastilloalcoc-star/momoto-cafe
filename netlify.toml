# Momoto Café — configuración de Netlify (estático + funciones serverless)

[build]
  # No hay paso de compilación: se publica la raíz tal cual.
  publish = "."
  # Base URL después de configurar dominio personalizado
  base = "."

# Funciones serverless (Stripe Checkout y rastreo DHL)
# Requieren variables de entorno en Netlify:
#   STRIPE_SECRET_KEY (obligatoria para pagos)
#   DHL_API_KEY       (opcional, para rastreo con línea de tiempo)
[functions]
  directory = "netlify/functions"

# Cabeceras de seguridad para todas las rutas
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://ssl.google-analytics.com https://www.googleadservices.com https://googleads.g.doubleclick.net https://connect.facebook.net https://www.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://stats.g.doubleclick.net https://www.google.com https://connect.facebook.net https://www.facebook.com https://www.clarity.ms; frame-src https://td.doubleclick.net https://bid.g.doubleclick.net https://www.googletagmanager.com; frame-ancestors 'self'; base-uri 'self'; object-src 'none'"

# URL limpia para el aviso de privacidad (Netlify ya sirve /aviso-de-privacidad,
# este rewrite lo deja explícito y a prueba de fallos).
[[redirects]]
  from = "/aviso-de-privacidad"
  to = "/aviso-de-privacidad.html"
  status = 200

# Ocultar archivos internos del dominio (siguen en el repo, pero no se sirven)
[[redirects]]
  from = "/README.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/INSTRUCCIONES.md"
  to = "/404.html"
  status = 404
  force = true

# Página 404 personalizada
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Canonicalización: momotocafe.com (sin www) → www.momotocafe.com
[[redirects]]
  from = "https://momotocafe.com/*"
  to = "https://www.momotocafe.com/:splat"
  status = 301
  force = true
