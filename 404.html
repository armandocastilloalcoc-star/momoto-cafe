<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Página no encontrada · Momoto Café</title>
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#062B26">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,300&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --verde-sombra:#062B26; --verde-selva:#0E4A40; --papel:#F4EFE6; --salvia:#8FB8A6;
  --cereza:#B23A2E; --papel-72:rgba(244,239,230,.72);
  --display:"Cormorant Garamond","Fraunces",Georgia,serif;
  --ui:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0}
body{font-family:var(--ui);background:var(--verde-sombra);color:var(--papel);
  min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px;line-height:1.7;-webkit-font-smoothing:antialiased}
.eyebrow{font-weight:600;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--salvia);display:inline-flex;align-items:center;gap:12px;margin-bottom:20px}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--cereza)}
h1{font-family:var(--display);font-weight:400;font-size:clamp(2.5rem,9vw,4.5rem);
  line-height:1.02;letter-spacing:-.015em;margin-bottom:16px}
h1 em{font-style:italic;font-weight:300;color:var(--salvia)}
p{color:var(--papel-72);max-width:44ch;margin-bottom:32px}
.btn{display:inline-flex;align-items:center;gap:11px;font-weight:600;font-size:.875rem;
  letter-spacing:.04em;padding:16px 30px;border-radius:2px;min-height:48px;text-decoration:none;
  background:var(--salvia);color:var(--verde-sombra);transition:transform .4s var(--ease),background .3s var(--ease)}
.btn:hover{background:var(--papel);transform:translateY(-2px)}
a:focus-visible{outline:3px solid var(--salvia);outline-offset:2px;border-radius:2px}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <span class="eyebrow">Error 404</span>
  <h1>Esta página se fue <em>a la sombra.</em></h1>
  <p>No encontramos lo que buscas, pero tu café sí está a un clic de distancia.</p>
  <a class="btn" href="index.html">Volver al inicio</a>
</body>
</html>
