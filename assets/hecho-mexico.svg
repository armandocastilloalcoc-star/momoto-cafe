<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Hecho en México">
  <defs>
    <path id="hm-top" d="M100,100 m-74,0 a74,74 0 0,1 148,0" />
    <path id="hm-bot" d="M100,100 m-66,0 a66,66 0 0,0 132,0" />
  </defs>
  <circle cx="100" cy="100" r="97" fill="#003040"/>
  <circle cx="100" cy="100" r="89" fill="#F6F3EA"/>
  <circle cx="100" cy="100" r="83" fill="none" stroke="#003040" stroke-width="1.5" stroke-dasharray="1.5 4" opacity="0.7"/>
  <text font-family="Poppins, Arial, sans-serif" font-weight="700" fill="#003040" font-size="16.5" letter-spacing="1.5">
    <textPath href="#hm-top" startOffset="50%" text-anchor="middle">HECHO EN</textPath>
  </text>
  <text font-family="Poppins, Arial, sans-serif" font-weight="600" fill="#37c877" font-size="11" letter-spacing="2.4">
    <textPath href="#hm-bot" startOffset="50%" text-anchor="middle">CAFÉ ORGÁNICO</textPath>
  </text>
  <!-- grano de café central -->
  <g transform="translate(100,101) rotate(-16)">
    <ellipse rx="17" ry="25" fill="#003040"/>
    <path d="M0,-22 C 7,-9 7,9 0,22" stroke="#7FE599" stroke-width="3.2" fill="none" stroke-linecap="round"/>
  </g>
  <text x="100" y="150" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="700" fill="#003040" font-size="20" letter-spacing="1">MÉXICO</text>
</svg>
